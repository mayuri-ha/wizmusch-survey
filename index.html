<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケットシーシャに関するアンケート</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: #f9f9f7;
    font-family: 'Helvetica Neue', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    color: #1a1a1a;
    min-height: 100vh;
  }
  #root { min-height: 100vh; }

  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    min-height: 100vh;
  }

  /* Progress */
  .progress-wrap { margin-bottom: 36px; }
  .progress-meta { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .progress-meta span { font-size: 12px; color: #999; }
  .progress-bar { width: 100%; height: 2px; background: #e8e8e6; border-radius: 1px; }
  .progress-fill { height: 2px; background: #1a1a1a; border-radius: 1px; transition: width 0.4s ease; }

  /* Intro */
  .intro-label { font-size: 11px; font-weight: 500; letter-spacing: 2px; color: #bbb; text-transform: uppercase; margin-bottom: 20px; }
  .intro-title { font-size: 26px; font-weight: 600; line-height: 1.5; margin-bottom: 20px; }
  .intro-body { font-size: 15px; color: #666; line-height: 1.8; margin-bottom: 10px; }
  .intro-note { font-size: 13px; color: #aaa; line-height: 1.6; margin-top: 28px; margin-bottom: 40px; }

  /* Question */
  .question-block { margin-bottom: 40px; }
  .question-text { font-size: 15px; font-weight: 500; line-height: 1.65; margin-bottom: 4px; }
  .question-num { color: #999; font-weight: 500; margin-right: 4px; }
  .question-required { color: #c24b3b; margin-left: 4px; font-size: 13px; }
  .question-sub { font-size: 13px; color: #999; margin-bottom: 12px; margin-top: 4px; }

  /* Options */
  .option-list { display: flex; flex-direction: column; gap: 6px; }
  .option-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 8px;
    border: 1px solid #e0e0de;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
    font-size: 14px; color: #333; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .option-item:hover { border-color: #ccc; background: #fafaf8; }
  .option-item.selected { border: 1.5px solid #1a1a1a; background: #fafaf8; }
  .option-item.disabled { opacity: 0.45; cursor: not-allowed; }

  .radio-dot {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid #ccc; flex-shrink: 0;
    transition: border 0.15s; display: flex; align-items: center; justify-content: center;
  }
  .option-item.selected .radio-dot { border: 5px solid #1a1a1a; }

  .rank-badge {
    width: 24px; height: 24px; border-radius: 50%;
    border: 1.5px solid #ddd; background: #fff;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: #ccc;
    transition: all 0.15s;
  }
  .rank-badge.active {
    background: #1a1a1a; color: #fff; border-color: #1a1a1a;
  }

  .checkbox-box {
    width: 18px; height: 18px; border-radius: 4px;
    border: 2px solid #ccc; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .option-item.selected .checkbox-box { border: none; background: #1a1a1a; }

  .other-input {
    margin-top: 6px; margin-left: 28px;
    width: calc(100% - 28px);
    padding: 8px 12px; border: 1px solid #e0e0de;
    border-radius: 6px; font-size: 14px; font-family: inherit;
    outline: none; color: #1a1a1a; background: #fff;
    transition: border-color 0.15s;
  }
  .other-input:focus { border-color: #aaa; }

  /* Concept grid */
  .concept-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .concept-card {
    padding: 16px; border-radius: 8px;
    border: 1px solid #e0e0de; cursor: pointer;
    transition: all 0.15s; text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .concept-card:hover { border-color: #ccc; background: #fafaf8; }
  .concept-card.selected { border: 1.5px solid #1a1a1a; background: #fafaf8; }
  .concept-card { display: flex; flex-direction: column; align-items: center; padding: 12px; }
  .concept-card p { font-size: 13px; font-weight: 500; margin-top: 8px; }
  .concept-img-wrap {
    width: 100%; aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
    background: #fff; border-radius: 6px; overflow: hidden;
  }
  .concept-img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
  }
  .concept-card-none {
    grid-column: 1 / -1;
    padding: 14px; min-height: auto;
  }
  .concept-card-none p { margin-top: 0; }

  /* Textarea */
  .survey-textarea {
    width: 100%; padding: 10px 14px;
    border: 1px solid #e0e0de; border-radius: 8px;
    font-size: 14px; font-family: inherit; line-height: 1.6;
    resize: vertical; outline: none; color: #1a1a1a; background: #fff;
    transition: border-color 0.15s;
  }
  .survey-textarea:focus { border-color: #aaa; }

  /* Error */
  .error-msg { color: #c24b3b; font-size: 13px; margin-top: 6px; }
  .submit-error { color: #c24b3b; font-size: 14px; text-align: center; margin-bottom: 16px; }

  /* Buttons */
  .btn-row { display: flex; gap: 12px; margin-top: 16px; }
  .btn-primary {
    flex: 2; padding: 14px 0;
    background: #1a1a1a; color: #fff; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { background: #999; cursor: wait; }
  .btn-secondary {
    flex: 1; padding: 14px 0;
    background: transparent; color: #1a1a1a;
    border: 1px solid #e0e0de; border-radius: 8px;
    font-size: 15px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: #f5f5f3; }
  .btn-full { flex: 1; }

  /* Complete */
  .complete-wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding-top: 80px;
  }
  .complete-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: #1a1a1a; display: flex;
    align-items: center; justify-content: center; margin-bottom: 24px;
  }
  .complete-title { font-size: 22px; font-weight: 600; margin-bottom: 12px; }
  .complete-body { font-size: 15px; color: #666; line-height: 1.7; max-width: 340px; }

  @media (max-width: 480px) {
    .container { padding: 32px 16px 60px; }
    .intro-title { font-size: 22px; }
    .concept-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxIFktEQ3DbzEZ6uo3sqWYyf8bhrtFWYxiEo1E0zQQdzsc-0oM-muQGouUC3Mzr18km/exec";

const SECTIONS = [
  {
    id: "common1", title: "基本情報",
    condition: () => true,
    questions: [
      { id:"q1", text:"あなたの年齢を教えてください", type:"radio", required:true,

      { id:"q3", text:"シーシャ店（シーシャバー・シーシャカフェ）にはどのくらいの頻度で行きますか？", type:"radio", required:true,

      { id:"q4", text:"ポケットシーシャ（またはVape）を使ったことはありますか？", type:"radio", required:true,
        options:["ポケットシーシャを使ったことがある","Vapeを使ったことがある","両方使ったことがある","どちらも使ったことがない"] },
      { id:"q5", text:"普段、欲しいものがあったときに最もよく買い物をする場所はどこですか？", sub:"よく使う順に1位〜3位を選んでください", type:"ranking", required:true, rankCount:3,
        options:["コンビニ・ドラッグストアなど実店舗","ドン・キホーテなどバラエティショップ","Amazon","楽天市場","メーカー公式サイト / ブランドEC","SHEIN・Temuなど海外EC","その他"] },
      { id:"q6", text:"ポケットシーシャ（またはVape）に関する情報を、普段どこで目にしますか？", sub:"複数選択可", type:"checkbox", required:true, hasOther:true,

      { id:"q9", text:"上の質問で選んだブランドの中で、実際に使ったことがあるものを全て選んでください", type:"checkbox", required:true, hasOther:true,

      { id:"q10", text:"使ったことのある製品について、満足しているポイントを全て選んでください", type:"checkbox", required:true,

      { id:"q11", text:"逆に、不満に感じているポイントがあれば全て選んでください", type:"checkbox", required:false,

const EXCLUSIVE = ["特にブランド名は覚えていない","使ったことがあるものはない","特にない","特になし / 今も買っている","特に情報収集していない"];

const { useState, useRef } = React;

function CheckIcon() {
  return React.createElement('svg', { width:12, height:12, viewBox:"0 0 12 12", fill:"none" },
    React.createElement('path', { d:"M2 6L5 9L10 3", stroke:"white", strokeWidth:2, strokeLinecap:"round", strokeLinejoin:"round" })
  );
}

function QuestionBlock({ q, answers, setAnswer, error, questionNumber }) {
  const val = answers[q.id];
  const otherKey = q.id + "_other";

  const handleRadio = (opt) => {
    setAnswer(q.id, opt);
    if (opt !== "その他") setAnswer(otherKey, "");
  };

  const handleCheck = (opt) => {
    const cur = Array.isArray(val) ? [...val] : [];
    if (EXCLUSIVE.includes(opt)) {
      setAnswer(q.id, cur.includes(opt) ? [] : [opt]);
      return;
    }
    const cleaned = cur.filter(v => !EXCLUSIVE.includes(v));
    if (cleaned.includes(opt)) {
      setAnswer(q.id, cleaned.filter(v => v !== opt));
    } else {
      if (q.maxSelect && cleaned.length >= q.maxSelect) return;
      setAnswer(q.id, [...cleaned, opt]);
    }
  };

  const isChecked = (opt) => Array.isArray(val) && val.includes(opt);
  const atMax = q.maxSelect && Array.isArray(val) && val.length >= q.maxSelect;

  return React.createElement('div', { className: 'question-block' },
    React.createElement('p', { className: 'question-text' },
      React.createElement('span', { className: 'question-num' }, 'Q' + questionNumber + '. '),
      q.text,
      q.required && React.createElement('span', { className: 'question-required' }, '*')
    ),
    q.sub && React.createElement('p', { className: 'question-sub' }, q.sub),

    // Radio
    q.type === 'radio' && React.createElement('div', { className: 'option-list' },
      q.options.map(opt =>
        React.createElement('label', {
          key: opt,
          className: 'option-item' + (val === opt ? ' selected' : ''),
          onClick: () => handleRadio(opt)
        },
          React.createElement('div', { className: 'radio-dot' }),
          opt
        )
      ),
      q.hasOther && val === 'その他' && React.createElement('input', {
        type: 'text', className: 'other-input',
        placeholder: '具体的に教えてください',
        value: answers[otherKey] || '',
        onChange: e => setAnswer(otherKey, e.target.value)
      })
    ),

    // Checkbox
    q.type === 'checkbox' && React.createElement('div', { className: 'option-list' },
      q.options.map(opt => {
        const checked = isChecked(opt);
        const disabled = atMax && !checked;
        return React.createElement('label', {
          key: opt,
          className: 'option-item' + (checked ? ' selected' : '') + (disabled ? ' disabled' : ''),
          onClick: disabled ? null : () => handleCheck(opt)
        },
          React.createElement('div', { className: 'checkbox-box' },
            checked && React.createElement(CheckIcon)
          ),
          opt
        );
      }),
      q.hasOther && isChecked('その他') && React.createElement('input', {
        type: 'text', className: 'other-input',
        placeholder: '具体的に教えてください',
        value: answers[otherKey] || '',
        onChange: e => setAnswer(otherKey, e.target.value)
      })
    ),

    // Textarea
    q.type === 'textarea' && React.createElement('textarea', {
      className: 'survey-textarea', rows: 3,
      placeholder: q.placeholder || '自由にお書きください',
      value: val || '',
      onChange: e => setAnswer(q.id, e.target.value)
    }),

    // Ranking
    q.type === 'ranking' && React.createElement('div', { className: 'option-list' },
      q.options.map(opt => {
        const ranks = Array.isArray(val) ? val : [];
        const rankIdx = ranks.indexOf(opt);
        const isRanked = rankIdx >= 0;
        const isFull = ranks.length >= q.rankCount;
        const disabled = !isRanked && isFull;
        const handleClick = () => {
          if (isRanked) {
            // Remove this rank (subsequent items shift up)
            setAnswer(q.id, ranks.filter(x => x !== opt));
          } else {
            if (isFull) return;
            setAnswer(q.id, [...ranks, opt]);
          }
        };
        return React.createElement('label', {
          key: opt,
          className: 'option-item' + (isRanked ? ' selected' : '') + (disabled ? ' disabled' : ''),
          onClick: disabled ? null : handleClick
        },
          React.createElement('div', {
            className: 'rank-badge' + (isRanked ? ' active' : '')
          }, isRanked ? (rankIdx + 1) : ''),
          opt
        );
      })
    ),


    // Concept
    q.type === 'concept' && React.createElement('div', null,
      React.createElement('div', { className: 'concept-grid' },
        q.options.map(opt => {
          const isNone = !opt.img;
          return React.createElement('div', {
            key: opt.label,
            className: 'concept-card' + (val === opt.label ? ' selected' : '') + (isNone ? ' concept-card-none' : ''),
            onClick: () => setAnswer(q.id, opt.label)
          },
            opt.img && React.createElement('div', { className: 'concept-img-wrap' },
              React.createElement('img', { src: opt.img, alt: opt.label, className: 'concept-img' })
            ),
            React.createElement('p', null, opt.label)
          );
        })
      ),
      val && val !== 'どれも購入したいと思わない' && React.createElement('textarea', {
        className: 'survey-textarea', rows: 2,
        placeholder: '選んだ理由を教えてください',
        value: answers[q.id + '_reason'] || '',
        onChange: e => setAnswer(q.id + '_reason', e.target.value)
      })
    ),

    error && React.createElement('p', { className: 'error-msg' }, error)
  );
}

function App() {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [errors, setErrors] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState(null);
  const topRef = useRef(null);

  const active = SECTIONS.filter(s => s.condition(answers));
  const total = active.length;

  const setAnswer = (key, val) => {
    setAnswers(prev => ({ ...prev, [key]: val }));
    setErrors(prev => { const n = { ...prev }; delete n[key]; return n; });
  };

  const validate = (sec) => {
    const errs = {};
    sec.questions.forEach(q => {
      if (!q.required) return;
      const v = answers[q.id];
      if (q.type === 'radio' || q.type === 'concept') { if (!v) errs[q.id] = '回答を選択してください'; }
      else if (q.type === 'checkbox') { if (!Array.isArray(v) || !v.length) errs[q.id] = '1つ以上選択してください'; }
      else if (q.type === 'ranking') {
        if (!Array.isArray(v) || v.length < q.rankCount) errs[q.id] = q.rankCount + '位まで全て選択してください';
      }
    });
    return errs;
  };

  const scrollTop = () => topRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });

  const handleNext = async () => {
    if (step === 0) { setStep(1); scrollTop(); return; }
    const sec = active[step - 1];
    const errs = validate(sec);
    if (Object.keys(errs).length) { setErrors(errs); return; }
    if (step < total) { setStep(step + 1); scrollTop(); return; }
    // Submit
    setSubmitting(true);
    setSubmitError(null);
    try {
      const payload = { timestamp: new Date().toISOString(), ...answers };
      // Arrays → comma-separated string for sheets
      const flat = {};
      Object.entries(payload).forEach(([k, v]) => { flat[k] = Array.isArray(v) ? v.join(', ') : (v || ''); });
      await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(flat),
        mode: 'no-cors'
      });
      setStep(total + 1);
      scrollTop();
    } catch (e) {
      setSubmitError('送信に失敗しました。もう一度お試しください。');
    } finally {
      setSubmitting(false);
    }
  };

  const handleBack = () => { if (step > 0) { setStep(step - 1); scrollTop(); } };

  // Intro
  if (step === 0) return React.createElement('div', { className: 'container', ref: topRef },
    React.createElement('p', { className: 'intro-label' }, 'Survey'),
    React.createElement('h1', { className: 'intro-title' }, 'ポケットシーシャに関する\nアンケート'),
    React.createElement('p', { className: 'intro-body' }, '本アンケートは、シーシャ店に行ったことがある方を対象に、ポケットシーシャ（またはVape）に関するご意見をお聞きするものです。'),
    React.createElement('p', { className: 'intro-body' }, '所要時間は約3〜5分です。回答は全て匿名で処理されます。'),
    
    React.createElement('button', { className: 'btn-primary btn-full', onClick: handleNext }, 'アンケートを始める')
  );

  // Complete
  if (step > total) return React.createElement('div', { className: 'container', ref: topRef },
    React.createElement('div', { className: 'complete-wrap' },
      React.createElement('div', { className: 'complete-icon' },
        React.createElement('svg', { width:24, height:24, viewBox:"0 0 24 24", fill:"none" },
          React.createElement('path', { d:"M5 12L10 17L19 7", stroke:"white", strokeWidth:2.5, strokeLinecap:"round", strokeLinejoin:"round" })
        )
      ),
      React.createElement('h2', { className: 'complete-title' }, 'ご回答ありがとうございました'),
      React.createElement('p', { className: 'complete-body' }, 'いただいた回答は今後の製品開発の参考にさせていただきます。')
    )
  );

  // Questions
  const sec = active[step - 1];
  return React.createElement('div', { className: 'container', ref: topRef },
    React.createElement('div', { className: 'progress-wrap' },
      React.createElement('div', { className: 'progress-meta' },
        React.createElement('span', null, step + ' / ' + total),
        React.createElement('span', null, sec.title)
      ),
      React.createElement('div', { className: 'progress-bar' },
        React.createElement('div', { className: 'progress-fill', style: { width: (step / total * 100) + '%' } })
      )
    ),
    (() => {
      // Compute global question numbers across active sections
      let qNum = 0;
      for (let i = 0; i < step - 1; i++) qNum += active[i].questions.length;
      return sec.questions.map((q, idx) => React.createElement(QuestionBlock, {
        key: q.id, q, answers, setAnswer, error: errors[q.id],
        questionNumber: qNum + idx + 1
      }));
    })(),
    submitError && React.createElement('p', { className: 'submit-error' }, submitError),
    React.createElement('div', { className: 'btn-row' },
      step > 1 && React.createElement('button', { className: 'btn-secondary', onClick: handleBack }, '戻る'),
      React.createElement('button', {
        className: 'btn-primary',
        onClick: handleNext,
        disabled: submitting
      }, submitting ? '送信中...' : step < total ? '次へ' : '回答を送信する')
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
